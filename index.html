<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KARTIKEY BHARAT GAS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .login-container, .app {
            max-width: 450px; width: 100%; background: white; border-radius: 28px;
            overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .login-card { padding: 25px 20px; text-align: center; }
        .login-card h2 {
            font-size: 1.6rem; margin-bottom: 6px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            background-clip: text; -webkit-background-clip: text; color: transparent;
        }
        .login-card input {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0;
            border-radius: 40px; font-size: 0.9rem; outline: none; background: #f8fafc;
        }
        .login-card button {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 40px; font-weight: bold;
            font-size: 0.9rem; margin-top: 12px; cursor: pointer;
        }
        .loading-msg { color: #667eea; font-size: 0.8rem; margin-top: 15px; display: none; }
        .error-msg { color: #dc2626; font-size: 0.75rem; margin-top: 10px; display: none; }

        .app { display: flex; flex-direction: column; height: 85vh; overflow: hidden; }
        .header {
            background: linear-gradient(135deg, #f093fb, #f5576c); color: white;
            padding: 8px 14px; display: flex; justify-content: space-between; align-items: center;
        }
        .new-order-header-btn {
            background: white; color: #f5576c; border: none; border-radius: 40px;
            padding: 5px 12px; font-size: 0.7rem; font-weight: bold; cursor: pointer;
        }
        .user-info {
            display: flex; align-items: center; gap: 10px; font-size: 0.65rem;
            background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 40px;
        }
        .logout-btn { background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 30px; cursor: pointer; }

        .date-filter-row {
            display: flex; gap: 8px; margin: 8px 8px 6px; align-items: center;
        }
        .date-filter-row select {
            flex: 1; padding: 9px 12px; border-radius: 25px; border: 1px solid #cbd5e1;
            font-size: 0.78rem; background: white;
        }
        .date-filter-row button {
            padding: 9px 16px; background: #4f46e5; color: white; border: none;
            border-radius: 25px; font-size: 0.78rem; white-space: nowrap;
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            margin: 6px 8px; flex-shrink: 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
            padding: 10px 4px; border-radius: 14px; text-align: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        .stat-card.warning { background: linear-gradient(135deg, #f59e0b, #dc2626); }
        .stat-card small { font-size: 0.68rem; display: block; margin-bottom: 3px; }
        .stat-card h3 { font-size: 1.15rem; font-weight: bold; }

        .backup-section { background: #f1f5f9; margin: 4px 8px; padding: 10px; border-radius: 12px; }
        .backup-restore { background: #e0e7ff; padding: 12px; border-radius: 12px; text-align: center; }
        .backup-restore button { padding: 9px 16px; margin: 4px; font-size: 0.8rem; border: none; border-radius: 8px; cursor: pointer; }

        .orders-list { flex: 1; overflow-y: auto; margin: 5px 8px; }
        .order-item {
            background: white; border: 1px solid #e5e7eb; border-radius: 10px;
            padding: 8px; margin-bottom: 8px;
        }
        .order-item.old-customer { border: 2px solid #dc2626; background: #fef2f2; }
        .old-badge { background: #dc2626; color: white; padding: 2px 8px; border-radius: 16px; font-size: 0.6rem; }
        .action-btns { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .action-btn {
            padding: 4px 10px; font-size: 0.65rem; font-weight: bold;
            border-radius: 20px; cursor: pointer; border: none;
        }
        .processing-btn { background: #10b981; color: white; }
        .deliver-btn { background: #3b82f6; color: white; }
        .delete-btn { background: #ef4444; color: white; }
        .call-btn { background: #22c55e; color: white; }
        .nav { display: flex; gap: 3px; padding: 6px 8px; background: white; border-top: 1px solid #e5e7eb; flex-shrink: 0; }
        .nav-btn {
            background: #f1f5f9; color: #334155; flex: 1; padding: 6px 4px;
            font-size: 0.68rem; font-weight: bold; border: none; border-radius: 20px; cursor: pointer;
        }
        .nav-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:1000; }
        .modal-content {
            background:white; width:90%; max-width:400px; border-radius:24px;
            padding:20px; max-height:90vh; overflow-y:auto;
        }
        .empty-state { text-align:center; padding:20px; color:#94a3b8; }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h2>🚚 KARTIKEY BHARAT GAS</h2>
        <p style="margin-bottom: 15px;">लॉगिन करें</p>
        <input type="text" id="loginUsername" placeholder="यूजरनेम" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="पासवर्ड">
        <div id="loadingMsg" class="loading-msg">⏳ डेटाबेस लोड हो रहा है...</div>
        <button id="doLoginBtn" style="display:none;">लॉगिन करें</button>
        <button id="restoreBtnLogin" style="display:none; margin-top:8px; background:#f59e0b;">📥 रिस्टोर बैकअप</button>
        <div id="loginError" class="error-msg">गलत यूजरनेम या पासवर्ड</div>
    </div>
    <input type="file" id="restoreFileInputLogin" accept=".json" style="display:none">
</div>

<div id="mainApp" class="app" style="display: none;">
    <div class="header">
        <h1>🚚 KARTIKEY BHARAT GAS</h1>
        <button class="new-order-header-btn" id="newOrderHeaderBtn">➕ नया ऑर्डर</button>
        <div class="user-info">
            <span id="userRoleBadge"></span>
            <span class="logout-btn" id="logoutBtn">लॉगआउट</span>
        </div>
    </div>

    <div class="date-filter-row">
        <select id="dateFilterSelect">
            <option value="all">📅 सारे ऑर्डर</option>
            <option value="today">✅ आज</option>
            <option value="yesterday">⬅️ कल</option>
            <option value="week">📆 इस सप्ताह</option>
            <option value="month">📅 इस महीने</option>
        </select>
        <button id="applyDateFilterBtn">लागू करें</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><small>📦 डिलीवर</small><h3 id="totalDelivered">0</h3></div>
        <div class="stat-card"><small>👥 कंज्यूमर</small><h3 id="totalConsumers">0</h3></div>
        <div class="stat-card"><small>🔑 DSC</small><h3 id="totalDscCodes">0</h3></div>
        <div class="stat-card warning"><small>⚠️ 25+ कस्टमर</small><h3 id="totalOldCustomers">0</h3></div>
        <div class="stat-card"><small>📊 कुल</small><h3 id="totalOrders">0</h3></div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 नाम / मोबाइल / कंज्यूमर नंबर से खोजें..." autocomplete="off">
            <button id="searchBtn">खोजें</button>
            <button id="clearSearchBtn" style="background:#6b7280;">साफ करें</button>
        </div>
        <div id="suggestions" class="suggestions"></div>
    </div>

    <div id="backupSection" class="backup-section">
        <div class="backup-restore">
            <button id="backupBtn">📤 बैकअप डाउनलोड</button>
            <button id="restoreBtn">📥 रिस्टोर (Merge)</button>
            <input type="file" id="restoreFileInput" accept=".json" style="display:none">
        </div>
    </div>

    <div id="adminPanel" class="admin-panel" style="display: none;">
        <h4>👑 एडमिन पैनल</h4>
        <div class="agent-row">
            <input type="text" id="newAgentUser" placeholder="यूजरनेम">
            <input type="text" id="newAgentPass" placeholder="पासवर्ड">
            <button id="createAgentBtn" class="small-btn">➕ बनाएं</button>
        </div>
        <div id="agentListDisplay" class="agent-list"></div>
    </div>

    <div class="orders-list">
        <h3>📋 ऑर्डर लिस्ट <span style="color:#dc2626;">(लाल = 25+ दिन)</span></h3>
        <div id="ordersContainer"></div>
    </div>

    <div class="nav">
        <button class="nav-btn active" data-filter="all">सभी</button>
        <button class="nav-btn" data-filter="pending">⏳ पेंडिंग</button>
        <button class="nav-btn" data-filter="processing">🚚 प्रोसेसिंग</button>
        <button class="nav-btn" data-filter="delivered">✅ डिलीवर</button>
        <button class="nav-btn" data-filter="old30">⚠️ 25+ कस्टमर</button>
    </div>
</div>

<!-- Modal -->
<div id="orderModal" class="modal">
    <div class="modal-content">
        <h3>🛒 नया ऑर्डर</h3>
        <div class="form-group"><label>कंज्यूमर नंबर</label><input id="modalConsumerNo" placeholder="1234567890"></div>
        <div class="form-group"><label>मोबाइल</label><input id="modalMobile" placeholder="9876543210"></div>
        <div class="form-group"><label>ग्राहक नाम</label><input id="modalCustomerName" placeholder="राम कुमार"></div>
        <div class="form-group"><label>सिलेंडर</label>
            <select id="modalCylinderType">
                <option value="14.2kg">14.2 kg (₹985)</option>
                <option value="19kg">19 kg (₹3050)</option>
            </select>
        </div>
        <div class="form-group"><label>पता</label><input id="modalAddress" placeholder="मेन रोड, दिल्ली"></div>
        <div class="form-group"><label>रिमार्क</label><textarea id="modalRemark" placeholder="नोट्स..."></textarea></div>
        <div class="modal-buttons">
            <button class="submit-order-btn" id="modalSubmitBtn">✅ ऑर्डर करें</button>
            <button class="cancel-modal-btn" id="modalCancelBtn">❌ रद्द करें</button>
        </div>
    </div>
</div>

<script>
    let db, currentUser = null, currentFilter = 'all', currentSearchTerm = '', allOrders = [], currentDateFilter = 'all', dbReady = false;

    const cylinderPrices = { '14.2kg': 985, '19kg': 3050 };
    const ADMIN_USER = { username: 'Hindu', password: 'Lion', role: 'admin' };
    const DEFAULT_AGENTS = [
        { username: 'Ramesh', password: 'ram123', role: 'agent' },
        { username: 'Suresh', password: 'sur123', role: 'agent' }
    ];

    function initDB() {
        const req = indexedDB.open('GasDeliveryDB', 24);
        req.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains('orders')) {
                const orderStore = db.createObjectStore('orders', { keyPath: 'id', autoIncrement: true });
                orderStore.createIndex('status', 'status');
                orderStore.createIndex('mobile', 'mobile');
                orderStore.createIndex('date', 'date');
            }
            if (!db.objectStoreNames.contains('customers')) db.createObjectStore('customers', { keyPath: 'mobile' });
            if (!db.objectStoreNames.contains('dscCodes')) db.createObjectStore('dscCodes', { keyPath: 'dscCode' });
            if (!db.objectStoreNames.contains('agents')) {
                const agentStore = db.createObjectStore('agents', { keyPath: 'username' });
                DEFAULT_AGENTS.forEach(agent => agentStore.put(agent));
            }
        };
        req.onsuccess = (e) => {
            db = e.target.result;
            dbReady = true;
            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('doLoginBtn').style.display = 'block';
            document.getElementById('restoreBtnLogin').style.display = 'block';
            checkSession();
        };
    }
    initDB();

    async function mergeStore(storeName, newItems) {
        return new Promise(resolve => {
            const tx = db.transaction([storeName], 'readwrite');
            const store = tx.objectStore(storeName);
            newItems.forEach(item => store.put(item));
            tx.oncomplete = resolve;
        });
    }

    function restoreDataFromJson(file, callback) {
        const reader = new FileReader();
        reader.onload = async (event) => {
            try {
                const backupData = JSON.parse(event.target.result);
                if (!backupData.orders || !backupData.customers || !backupData.dscCodes || !backupData.agents) throw new Error();

                if (!confirm('📥 बैकअप रिस्टोर करना चाहते हैं?\nपुराना डेटा रहेगा और नया डेटा Merge हो जाएगा')) return callback(false);

                await mergeStore('orders', backupData.orders);
                await mergeStore('customers', backupData.customers);
                await mergeStore('dscCodes', backupData.dscCodes);
                await mergeStore('agents', backupData.agents);

                alert('✅ डेटा Merge हो गया!');
                callback(true);
            } catch (err) {
                alert('❌ गलत JSON फाइल');
                callback(false);
            }
        };
        reader.readAsText(file);
    }

    // Backup
    document.getElementById('backupBtn').onclick = async () => {
        const tx = db.transaction(['orders','customers','dscCodes','agents'],'readonly');
        const orders = await new Promise(r => tx.objectStore('orders').getAll().onsuccess = e => r(e.target.result));
        const customers = await new Promise(r => tx.objectStore('customers').getAll().onsuccess = e => r(e.target.result));
        const dscCodes = await new Promise(r => tx.objectStore('dscCodes').getAll().onsuccess = e => r(e.target.result));
        const agents = await new Promise(r => tx.objectStore('agents').getAll().onsuccess = e => r(e.target.result));

        const backupData = { orders, customers, dscCodes, agents };
        const blob = new Blob([JSON.stringify(backupData, null, 2)], {type: 'application/json'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `KARTIKEY_GAS_BACKUP_${new Date().toISOString().slice(0,10)}.json`;
        link.click();
        alert('✅ बैकअप डाउनलोड हो गया');
    };

    function showApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        const isAdmin = currentUser.role === 'admin';
        document.getElementById('userRoleBadge').innerText = isAdmin ? '👑 एडमिन' : '🚚 एजेंट';
        document.getElementById('adminPanel').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('backupSection').style.display = 'block';

        if (isAdmin) loadAgentList();
        loadOrders();
        updateStats();
    }

    function checkSession() {
        if (dbReady && localStorage.getItem('currentUser')) {
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            showApp();
        }
    }

    // Login
    document.getElementById('doLoginBtn').onclick = () => {
        const uname = document.getElementById('loginUsername').value.trim();
        const pwd = document.getElementById('loginPassword').value.trim();

        if (uname === ADMIN_USER.username && pwd === ADMIN_USER.password) {
            currentUser = { username: ADMIN_USER.username, role: 'admin' };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            showApp();
            return;
        }

        db.transaction(['agents'], 'readonly').objectStore('agents').get(uname).onsuccess = (e) => {
            const agent = e.target.result;
            if (agent && agent.password === pwd) {
                currentUser = { username: agent.username, role: 'agent' };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showApp();
            } else {
                document.getElementById('loginError').style.display = 'block';
                setTimeout(() => document.getElementById('loginError').style.display = 'none', 2500);
            }
        };
    };

    document.getElementById('logoutBtn').onclick = () => {
        currentUser = null; localStorage.clear();
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('mainApp').style.display = 'none';
    };

    // Agent List
    function loadAgentList() {
        db.transaction(['agents'], 'readonly').objectStore('agents').getAll().onsuccess = (e) => {
            let html = '';
            e.target.result.forEach(agent => {
                if (DEFAULT_AGENTS.some(a => a.username === agent.username)) {
                    html += `<div class="agent-item"><span>🔑 ${agent.username} (डिफॉल्ट)</span></div>`;
                } else {
                    html += `<div class="agent-item"><span>🔑 ${agent.username}</span><button class="delete-agent-btn" data-agent="${agent.username}">🗑️</button></div>`;
                }
            });
            document.getElementById('agentListDisplay').innerHTML = html || 'कोई एजेंट नहीं';
        };
    }

    document.getElementById('createAgentBtn').onclick = () => {
        const nu = document.getElementById('newAgentUser').value.trim();
        const np = document.getElementById('newAgentPass').value.trim();
        if (!nu || !np) return alert('यूजरनेम और पासवर्ड भरें');
        const tx = db.transaction(['agents'], 'readwrite');
        tx.objectStore('agents').get(nu).onsuccess = (e) => {
            if (e.target.result) return alert('यह यूजरनेम पहले से है');
            tx.objectStore('agents').add({ username: nu, password: np, role: 'agent' });
            tx.oncomplete = () => {
                alert(`✅ ${nu} बना दिया गया`);
                document.getElementById('newAgentUser').value = '';
                document.getElementById('newAgentPass').value = '';
                loadAgentList();
            };
        };
    };

    // Modal Logic
    const modal = document.getElementById('orderModal');
    document.getElementById('newOrderHeaderBtn').onclick = () => modal.style.display = 'flex';
    document.getElementById('modalCancelBtn').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    document.getElementById('modalSubmitBtn').onclick = () => {
        const cn = document.getElementById('modalConsumerNo').value.trim();
        const name = document.getElementById('modalCustomerName').value.trim();
        const mob = document.getElementById('modalMobile').value.trim();
        const addr = document.getElementById('modalAddress').value.trim();
        const cyl = document.getElementById('modalCylinderType').value;
        const rem = document.getElementById('modalRemark').value.trim();

        if (!cn || !name || !mob || !addr) return alert('सभी जरूरी फील्ड भरें');

        const newOrder = {
            consumerNo: cn, customerName: name, mobile: mob, address: addr,
            cylinderType: cyl, price: cylinderPrices[cyl], status: 'pending',
            remark: rem, dscCode: null, date: new Date().toISOString(),
            deliveredDate: null, deliveryRemark: null
        };

        db.transaction(['orders'], 'readwrite').objectStore('orders').add(newOrder).onsuccess = () => {
            alert('✅ नया ऑर्डर जमा हो गया');
            modal.style.display = 'none';
            document.querySelectorAll('#modalConsumerNo,#modalCustomerName,#modalMobile,#modalAddress,#modalRemark').forEach(el => el.value = '');
            loadOrders();
            updateStats();
        };
    };

    // Search
    const searchInput = document.getElementById('searchInput');
    const suggestionsDiv = document.getElementById('suggestions');

    searchInput.addEventListener('input', () => {
        const term = searchInput.value.toLowerCase().trim();
        if (term.length < 2) { suggestionsDiv.style.display = 'none'; return; }
        const matches = [...new Set(allOrders.map(o => o.customerName).filter(Boolean))].filter(n => n.toLowerCase().includes(term)).slice(0,5);
        suggestionsDiv.innerHTML = matches.map(name => `<div class="suggestion-item" data-name="${name}">🔍 ${name}</div>`).join('');
        suggestionsDiv.style.display = matches.length ? 'block' : 'none';
    });

    document.getElementById('searchBtn').onclick = () => { currentSearchTerm = searchInput.value.trim().toLowerCase(); suggestionsDiv.style.display = 'none'; displayFilteredOrders(); };
    document.getElementById('clearSearchBtn').onclick = () => { searchInput.value = ''; currentSearchTerm = ''; suggestionsDiv.style.display = 'none'; displayFilteredOrders(); };
    document.getElementById('applyDateFilterBtn').onclick = () => { currentDateFilter = document.getElementById('dateFilterSelect').value; displayFilteredOrders(); updateStats(); };

    function getDateFromFilter() {
        const today = new Date(); today.setHours(0,0,0,0);
        if (currentDateFilter === 'today') return { start: today, end: new Date(today.getTime() + 86400000) };
        if (currentDateFilter === 'yesterday') { const y = new Date(today); y.setDate(y.getDate() - 1); return { start: y, end: today }; }
        if (currentDateFilter === 'week') { const ws = new Date(today); ws.setDate(today.getDate() - today.getDay()); return { start: ws, end: new Date(today.getTime() + 86400000) }; }
        if (currentDateFilter === 'month') { const ms = new Date(today.getFullYear(), today.getMonth(), 1); return { start: ms, end: new Date(today.getTime() + 86400000) }; }
        return null;
    }

    function filterOrdersByDate(orders) {
        if (currentDateFilter === 'all') return orders;
        const range = getDateFromFilter();
        if (!range) return orders;
        return orders.filter(o => {
            const od = new Date(o.date); od.setHours(0,0,0,0);
            return od >= range.start && od < range.end;
        });
    }

    function isCustomerOld(name, mobile, list = allOrders) {
        const custOrders = list.filter(o => o.customerName === name || o.mobile === mobile);
        if (!custOrders.length) return false;
        const latest = custOrders.reduce((a,b) => new Date(b.date) > new Date(a.date) ? b : a);
        return Math.ceil((new Date() - new Date(latest.date)) / 86400000) >= 25;
    }

    function getUniqueOldCustomersCount(ordersList) {
        const unique = new Map();
        ordersList.forEach(o => {
            if (!unique.has(o.mobile) || new Date(o.date) > new Date(unique.get(o.mobile).date)) unique.set(o.mobile, o);
        });
        let count = 0;
        unique.forEach(o => { if (Math.ceil((new Date() - new Date(o.date)) / 86400000) >= 25) count++; });
        return count;
    }

    function loadOrders() {
        db.transaction(['orders'], 'readonly').objectStore('orders').getAll().onsuccess = (e) => {
            allOrders = e.target.result || [];
            displayFilteredOrders();
            updateStats();
        };
    }

    function displayFilteredOrders() {
        let filtered = filterOrdersByDate([...allOrders]);
        if (currentSearchTerm) {
            filtered = filtered.filter(o => 
                (o.customerName && o.customerName.toLowerCase().includes(currentSearchTerm)) ||
                o.mobile.includes(currentSearchTerm) || 
                (o.consumerNo && o.consumerNo.includes(currentSearchTerm))
            );
        }
        if (currentFilter === 'pending') filtered = filtered.filter(o => o.status === 'pending');
        else if (currentFilter === 'processing') filtered = filtered.filter(o => o.status === 'processing');
        else if (currentFilter === 'delivered') filtered = filtered.filter(o => o.status === 'delivered');
        else if (currentFilter === 'old30') {
            const oldSet = new Set(filtered.filter(o => isCustomerOld(o.customerName, o.mobile, filtered)).map(o => o.mobile));
            filtered = filtered.filter(o => oldSet.has(o.mobile));
        }
        filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
        renderOrders(filtered);
    }

    function renderOrders(orders) {
        const container = document.getElementById('ordersContainer');
        if (!orders.length) {
            container.innerHTML = '<div class="empty-state">📭 कोई ऑर्डर नहीं</div>';
            return;
        }
        container.innerHTML = orders.map(order => {
            const isOld = isCustomerOld(order.customerName, order.mobile, orders);
            return `<div class="order-item ${isOld ? 'old-customer' : ''}">
                <div class="order-header">
                    <span><strong>${order.customerName}</strong> ${isOld ? '<span class="old-badge">25+ दिन</span>' : ''}</span>
                    <span class="status status-${order.status}">${order.status === 'pending' ? '⏳ पेंडिंग' : order.status === 'processing' ? '🚚 प्रोसेसिंग' : '✅ डिलीवर'}</span>
                </div>
                <div class="order-details">
                    <div><strong>🆔 कंज्यूमर:</strong> ${order.consumerNo}</div>
                    <div><strong>📞 मोबाइल:</strong> ${order.mobile}</div>
                    <div><strong>📍 पता:</strong> ${order.address}</div>
                    <div><strong>🎯 सिलेंडर:</strong> ${order.cylinderType} - ₹${order.price}</div>
                    ${order.dscCode ? `<div><strong>🔑 DSC:</strong> ${order.dscCode}</div>` : ''}
                    ${order.remark ? `<div><strong>📝 नोट:</strong> ${order.remark}</div>` : ''}
                </div>
                <div class="action-btns">
                    ${order.status === 'pending' ? `<button class="action-btn processing-btn" data-id="${order.id}">🚚 प्रोसेसिंग</button>` : ''}
                    ${order.status === 'processing' ? `<button class="action-btn deliver-btn" data-id="${order.id}">✅ डिलीवर</button>` : ''}
                    <button class="action-btn call-btn" data-mobile="${order.mobile}">📞 कॉल</button>
                    ${currentUser?.role === 'admin' ? `<button class="action-btn delete-btn" data-id="${order.id}">🗑️ डिलीट</button>` : ''}
                </div>
            </div>`;
        }).join('');

        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.onclick = () => {
                const id = parseInt(btn.dataset.id);
                if (btn.classList.contains('processing-btn')) moveToProcessing(id);
                else if (btn.classList.contains('deliver-btn')) moveToDelivered(id);
                else if (btn.classList.contains('delete-btn')) deleteOrder(id);
                else if (btn.dataset.mobile) window.location.href = `tel:${btn.dataset.mobile}`;
            };
        });
    }

    function moveToProcessing(id) {
        const dsc = prompt("DSC Code डालें:");
        if (!dsc) return;
        const tx = db.transaction(['orders'], 'readwrite');
        tx.objectStore('orders').get(id).onsuccess = (e) => {
            const o = e.target.result;
            o.status = 'processing';
            o.dscCode = dsc.toUpperCase();
            tx.objectStore('orders').put(o);
            alert('✅ प्रोसेसिंग में भेज दिया');
            loadOrders();
        };
    }

    function moveToDelivered(id) {
        if (!confirm("क्या आप इस ऑर्डर को डिलीवर करना चाहते हैं?")) return;
        const remark = prompt("डिलीवरी रिमार्क (वैकल्पिक):", "");
        const tx = db.transaction(['orders'], 'readwrite');
        tx.objectStore('orders').get(id).onsuccess = (e) => {
            const o = e.target.result;
            o.status = 'delivered';
            o.deliveredDate = new Date().toISOString();
            o.deliveryRemark = remark || '';
            tx.objectStore('orders').put(o);
            alert('✅ ऑर्डर डिलीवर कर दिया गया');
            loadOrders();
            updateStats();
        };
    }

    function deleteOrder(id) {
        if (currentUser?.role !== 'admin') return alert('सिर्फ एडमिन डिलीट कर सकता है');
        if (confirm('ऑर्डर डिलीट करें?')) {
            db.transaction(['orders'], 'readwrite').objectStore('orders').delete(id).onsuccess = () => {
                loadOrders(); updateStats();
            };
        }
    }

    function updateStats() {
        const filtered = filterOrdersByDate([...allOrders]);
        document.getElementById('totalDelivered').innerText = filtered.filter(o => o.status === 'delivered').length;
        document.getElementById('totalOrders').innerText = filtered.length;
        document.getElementById('totalConsumers').innerText = new Set(filtered.map(o => o.mobile)).size;
        document.getElementById('totalDscCodes').innerText = new Set(filtered.filter(o => o.dscCode).map(o => o.dscCode)).size;
        document.getElementById('totalOldCustomers').innerText = getUniqueOldCustomersCount(filtered);
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            displayFilteredOrders();
        };
    });

    document.getElementById('restoreBtn').onclick = () => document.getElementById('restoreFileInput').click();
    document.getElementById('restoreFileInput').onchange = (e) => {
        if (e.target.files[0]) restoreDataFromJson(e.target.files[0], (success) => {
            if (success) { loadOrders(); updateStats(); if (currentUser?.role === 'admin') loadAgentList(); }
        });
        e.target.value = '';
    };

    document.getElementById('restoreBtnLogin').onclick = () => document.getElementById('restoreFileInputLogin').click();
    document.getElementById('restoreFileInputLogin').onchange = (e) => {
        if (e.target.files[0]) restoreDataFromJson(e.target.files[0], () => {});
        e.target.value = '';
    };
</script>
</body>
</html>
